<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --vanilla: #F8F5EE;
            --vanilla-soft: #F2EDE2;
            --green-royal: #1B6B3A;
            --green-light: #2D9653;
            --green-glow: rgba(27, 107, 58, 0.3);
            --green-subtle: rgba(27, 107, 58, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.18);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-shadow: rgba(27, 107, 58, 0.12);
            --text-primary: #1a2e22;
            --text-secondary: rgba(26, 46, 34, 0.55);
        }

        @font-face {
            font-family: 'SF Pro Display';
            src: local('-apple-system'), local('BlinkMacSystemFont');
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vanilla);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Organic background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(27,107,58,0.18) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45,150,83,0.12) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(248,245,238,0.8) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            animation: float3 7s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -25px) scale(1.08); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Main card */
        .card {
            position: relative;
            z-index: 10;
            width: 340px;
            padding: 44px 36px 40px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            box-shadow:
                0 8px 32px rgba(27, 107, 58, 0.1),
                0 2px 8px rgba(27, 107, 58, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.9),
                inset 0 -1px 0 rgba(27,107,58,0.05);
            animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform: translateY(24px) scale(0.97);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo mark */
        .logo-mark {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--green-royal) 0%, var(--green-light) 100%);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(27,107,58,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            animation: logoIn 0.5s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes logoIn {
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .logo-mark svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        /* Text */
        .heading {
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin-bottom: 6px;
            animation: fadeUp 0.5s 0.3s both;
        }

        .subheading {
            text-align: center;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 32px;
            letter-spacing: -0.1px;
            animation: fadeUp 0.5s 0.35s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            animation: fadeUp 0.5s 0.4s both;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(27,107,58,0.15), transparent);
        }

        .divider-text {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Liquid Glass Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover::before { opacity: 1; }

        .btn:active {
            transform: scale(0.97);
        }

        /* GitHub button — dark liquid glass */
        .btn-github {
            background: rgba(26, 46, 34, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            box-shadow:
                0 4px 16px rgba(0,0,0,0.15),
                0 1px 4px rgba(0,0,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            animation: fadeUp 0.5s 0.45s both;
        }

        .btn-github::before {
            background: rgba(255,255,255,0.06);
        }

        .btn-github:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow:
                0 8px 24px rgba(0,0,0,0.2),
                0 2px 8px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* Google button — vanilla liquid glass */
        .btn-google {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(27,107,58,0.15);
            color: var(--text-primary);
            box-shadow:
                0 4px 16px rgba(27,107,58,0.08),
                0 1px 4px rgba(0,0,0,0.05),
                inset 0 1px 0 rgba(255,255,255,0.9);
            animation: fadeUp 0.5s 0.5s both;
        }

        .btn-google::before {
            background: rgba(27,107,58,0.04);
        }

        .btn-google:hover {
            transform: translateY(-2px) scale(1.01);
            border-color: rgba(27,107,58,0.25);
            box-shadow:
                0 8px 24px rgba(27,107,58,0.12),
                0 2px 8px rgba(0,0,0,0.06),
                inset 0 1px 0 rgba(255,255,255,1);
        }

        /* Icon containers */
        .btn-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: -0.1px;
            animation: fadeUp 0.5s 0.55s both;
            line-height: 1.5;
        }

        .footer a {
            color: var(--green-royal);
            text-decoration: none;
            font-weight: 500;
        }

        /* Shimmer effect on card */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            border-radius: inherit;
            animation: shimmer 4s 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { left: -100%; opacity: 0; }
            10% { opacity: 1; }
            50% { left: 150%; opacity: 1; }
            60% { opacity: 0; }
            100% { left: 150%; opacity: 0; }
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="card">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
            </svg>
        </div>

        <h1 class="heading">Welcome back</h1>
        <p class="subheading">Sign in to continue</p>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">Continue with</span>
            <div class="divider-line"></div>
        </div>

                </svg>
            </span>
            GitHub
        </a>

        <a id="google-link" href="#" class="btn btn-google">
            <span class="btn-icon">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </span>
            Google
        </a>

        <p class="footer">
            By continuing you agree to our <a href="#">Terms</a> & <a href="#">Privacy</a>
        </p>
    </div>

    <script>

        document.getElementById("google-link").href = googleUrl + googleOptions;
    </script>

</body>
</html>
