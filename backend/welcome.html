<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vanilla: #F8F5EE;
            --green-royal: #1B6B3A;
            --green-light: #2D9653;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-primary: #1a2e22;
            --text-secondary: rgba(26, 46, 34, 0.55);
        }

        body {
            min-height: 100vh;
            background: var(--vanilla);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        /* ── Background blobs ─────────────────────────────────────────── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(27, 107, 58, 0.18) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            animation: float1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(45, 150, 83, 0.12) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: float2 10s ease-in-out infinite;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(248, 245, 238, 0.9) 0%, transparent 70%);
            top: 40%;
            left: 35%;
            animation: float3 7s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, 30px) scale(1.05); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -25px) scale(1.08); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-15px, 15px); }
        }

        /* ── Card ─────────────────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 48px 40px 44px;
            box-shadow:
                0 8px 32px rgba(27, 107, 58, 0.1),
                0 2px 8px rgba(27, 107, 58, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            text-align: center;
            animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Shimmer sweep */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
            border-radius: inherit;
            animation: shimmer 4s 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0%   { left: -100%; opacity: 0; }
            10%  { opacity: 1; }
            50%  { left: 150%; opacity: 1; }
            60%  { opacity: 0; }
            100% { left: 150%; opacity: 0; }
        }

        /* ── Avatar ring ──────────────────────────────────────────────── */
        .avatar-wrap {
            position: relative;
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            animation: avatarIn 0.6s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes avatarIn {
            from { opacity: 0; transform: scale(0.4) rotate(-15deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-royal), var(--green-light), #a8d5b5);
            animation: spinRing 6s linear infinite;
        }

        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }

        .avatar-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green-royal) 0%, var(--green-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--vanilla);
            box-shadow: 0 4px 16px rgba(27, 107, 58, 0.25);
            z-index: 1;
        }

        .avatar-inner svg {
            width: 38px;
            height: 38px;
            fill: white;
        }

        /* ── Text ─────────────────────────────────────────────────────── */
        .welcome-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--green-royal);
            margin-bottom: 8px;
            animation: fadeUp 0.5s 0.3s both;
        }

        .welcome-title {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.6px;
            line-height: 1.2;
            margin-bottom: 12px;
            animation: fadeUp 0.5s 0.35s both;
        }

        .welcome-sub {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 36px;
            animation: fadeUp 0.5s 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Stats row ────────────────────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeUp 0.5s 0.45s both;
        }

        .stat-pill {
            flex: 1;
            background: rgba(27, 107, 58, 0.06);
            border: 1px solid rgba(27, 107, 58, 0.1);
            border-radius: 16px;
            padding: 14px 12px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--green-royal);
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
            margin-top: 2px;
        }

        /* ── Buttons ──────────────────────────────────────────────────── */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 15px 24px;
            background: linear-gradient(135deg, var(--green-royal) 0%, var(--green-light) 100%);
            color: white;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(27, 107, 58, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeUp 0.5s 0.5s both;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(27, 107, 58, 0.35);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }


    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="card">

        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar-inner">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
            </div>
        </div>

        <p class="welcome-label">Welcome back</p>
        <h1 class="welcome-title" id="title">Good to see you again</h1>
        <p class="welcome-sub">You've already completed the survey. Thank you for your contribution to the Algerian tech community.</p>

        <div class="stats-row">
            <div class="stat-pill">
                <div class="stat-value">✓</div>
                <div class="stat-label">Survey done</div>
            </div>
            <div class="stat-pill">
                <div class="stat-value" id="signin-count">—</div>
                <div class="stat-label">Last sign in</div>
            </div>
        </div>

        <a href="https://dzdevsurvey.com" class="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Go to Results
        </a>



    </div>

    <script>
        const userId = new URLSearchParams(window.location.search).get('user');

        // Fetch user info to show last sign in date
        async function loadUserInfo() {
            try {
                const res = await fetch(`http://localhost:4000/user/${userId}`);
                if (!res.ok) return;
                const user = await res.json();

                if (user.last_signin_at) {
                    const date = new Date(user.last_signin_at);
                    const formatted = date.toLocaleDateString('en-GB', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric'
                    });
                    document.getElementById('signin-count').textContent = formatted;
                }
            } catch (err) {
                // Silently fail — not critical
            }
        }

loadUserInfo();
    </script>

</body>
</html>
