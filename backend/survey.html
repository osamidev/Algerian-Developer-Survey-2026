<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --vanilla: #F8F5EE;
            --vanilla-soft: #F2EDE2;
            --green-royal: #1B6B3A;
            --green-light: #2D9653;
            --green-glow: rgba(27, 107, 58, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-primary: #1a2e22;
            --text-secondary: rgba(26, 46, 34, 0.55);
        }

        body {
            min-height: 100vh;
            background: var(--vanilla);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ── Background blobs ─────────────────────────────────────────── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(27, 107, 58, 0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 150, 83, 0.1) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25px, -25px); }
        }

        /* ── Card ─────────────────────────────────────────────────────── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 580px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow:
                0 8px 32px rgba(27, 107, 58, 0.1),
                0 2px 8px rgba(27, 107, 58, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: hidden;
        }

        /* ── Progress bar ─────────────────────────────────────────────── */
        .progress-wrap {
            padding: 24px 32px 0;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .progress-count {
            font-size: 12px;
            font-weight: 600;
            color: var(--green-royal);
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(27, 107, 58, 0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-royal), var(--green-light));
            border-radius: 99px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ── Question area ────────────────────────────────────────────── */
        .question-wrap {
            padding: 28px 32px 24px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
        }

        .q-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(27, 107, 58, 0.08);
            border: 1px solid rgba(27, 107, 58, 0.12);
            color: var(--green-royal);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 99px;
            margin-bottom: 14px;
            width: fit-content;
        }

        .q-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.45;
            letter-spacing: -0.3px;
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        /* ── Options list ─────────────────────────────────────────────── */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 9px;
            flex: 1;
            overflow-y: auto;
            max-height: 320px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(27, 107, 58, 0.2) transparent;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(27, 107, 58, 0.2);
            transform: translateX(3px);
        }

        .option-item.selected {
            background: rgba(27, 107, 58, 0.08);
            border-color: var(--green-royal);
            box-shadow: 0 0 0 3px rgba(27, 107, 58, 0.08);
        }

        /* Circle indicator (single choice) */
        .option-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(27, 107, 58, 0.25);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .option-item.selected .option-indicator {
            background: var(--green-royal);
            border-color: var(--green-royal);
        }

        .option-indicator::after {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .option-item.selected .option-indicator::after {
            opacity: 1;
        }

        /* Square indicator (multiple choice) */
        .multi .option-indicator {
            border-radius: 6px;
        }

        .multi .option-item.selected .option-indicator::after {
            width: 10px;
            height: 7px;
            border-radius: 0;
            background: transparent;
            border-left: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(-45deg) translateY(-1px);
            opacity: 1;
        }

        .option-text {
            font-size: 14px;
            font-weight: 450;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .option-item.selected .option-text {
            font-weight: 500;
            color: var(--green-royal);
        }

        /* ── Text / Number input ──────────────────────────────────────── */
        .text-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
            resize: vertical;
            min-height: 56px;
        }

        .text-input:focus {
            border-color: var(--green-royal);
            box-shadow: 0 0 0 3px rgba(27, 107, 58, 0.1);
        }

        .text-input::placeholder {
            color: var(--text-secondary);
        }

        /* ── Navigation ───────────────────────────────────────────────── */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px 28px;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 13px 22px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            color: var(--text-secondary);
        }

        .btn-back:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-primary);
        }

        .btn-back:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--green-royal) 0%, var(--green-light) 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(27, 107, 58, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            margin-left: auto;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(27, 107, 58, 0.35);
        }

        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-skip {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s;
        }

        .btn-skip:hover {
            color: var(--text-primary);
        }

        /* ── Loading / Error / Thank you screens ──────────────────────── */
        .loading-wrap,
        .error-wrap,
        .thankyou-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
            gap: 16px;
            padding: 32px;
            text-align: center;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(27, 107, 58, 0.15);
            border-top-color: var(--green-royal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text,
        .error-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .error-icon {
            font-size: 36px;
        }

        .thankyou-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--green-royal), var(--green-light));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(27, 107, 58, 0.3);
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            margin-bottom: 8px;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .thankyou-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .thankyou-sub {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 300px;
            line-height: 1.5;
        }

        /* ── Slide transitions ────────────────────────────────────────── */
        .slide-enter {
            animation: slideIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        .slide-back-enter {
            animation: slideBackIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideBackIn {
            from { opacity: 0; transform: translateX(-30px); }
            to   { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card">
        <div id="app">
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p class="loading-text">Loading survey…</p>
            </div>
        </div>
    </div>

<script>

    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const API_BASE  = 'http://localhost:4000';
    const SURVEY_ID = 1;

    // ─── STATE ────────────────────────────────────────────────────────────────
    // allQuestions : all questions from the DB sorted by position
    // optionsMap   : { question_id: [ {option_id, option_text}, ... ] }
    // answers      : { question_id: option_id | [option_ids] | number }
    //                lives only in RAM — resets on page refresh
    let allQuestions = [];
    let optionsMap   = {};
    let answers      = {};
    let currentIndex = 0;
    let userId       = null;

    // ─── DEPENDENCY RULES ─────────────────────────────────────────────────────
    //
    // TWO TYPES OF RULES:
    //
    // A) depends_on_option_id — comes from the DB column
    //    SHOW the question ONLY IF that option_id was selected anywhere
    //    Example: Q14 (state management) only shows if user picked option 36 (Front-End Dev)
    //
    // B) HIDE_IF — hardcoded below for reverse/negative logic
    //    HIDE the question IF a specific question has a specific answer
    //    Example: hide Q36 (which AI tool) if Q35 (AI frequency) = 361 (Never)
    //
    // Format: { question_id: { if_question: QID, has_answer: option_id | [option_ids] } }

    const HIDE_IF = {

        // AI tool questions — hide if Q35 (AI frequency) = 361 (Never)
        36: { if_question: 35, has_answer: 361 },
        37: { if_question: 35, has_answer: 361 },
        38: { if_question: 35, has_answer: 361 },

        // Work detail questions — hide if Q29 (employment status) = 334 (Unemployed)
        30: { if_question: 29, has_answer: 334 },
        31: { if_question: 29, has_answer: 334 },
        32: { if_question: 29, has_answer: 334 },

        // Freelance sources (Q33) — hide if Q29 = 332 (Employed) or 334 (Unemployed)
        // Only show if they are self-employed (333)
        33: { if_question: 29, has_answer: [332, 334] },
    };

    // ─── VISIBILITY CHECK ─────────────────────────────────────────────────────
    // Returns true if the question should be visible given current answers
    function shouldShow(q) {

        // Rule A: depends_on_option_id from DB
        // Show ONLY IF that option was selected somewhere in answers
        if (q.depends_on_option_id) {
            const requiredOptionId = parseInt(q.depends_on_option_id);

            const wasSelected = Object.values(answers).some(answer => {
                if (Array.isArray(answer)) {
                    return answer.includes(requiredOptionId);
                }
                return answer === requiredOptionId;
            });

            if (!wasSelected) return false;
        }

        // Rule B: HIDE_IF — hide if specific answer was given
        const rule = HIDE_IF[q.question_id];
        if (rule) {
            const givenAnswer = answers[rule.if_question];
            const hideOnValues = Array.isArray(rule.has_answer)
                ? rule.has_answer
                : [rule.has_answer];

            let shouldHide = false;
            if (Array.isArray(givenAnswer)) {
                shouldHide = givenAnswer.some(a => hideOnValues.includes(a));
            } else {
                shouldHide = hideOnValues.includes(givenAnswer);
            }

            if (shouldHide) return false;
        }

        return true;
    }

    // Returns only the questions that should be visible right now
    function getActiveQuestions() {
        return allQuestions.filter(q => shouldShow(q));
    }

    // When an answer changes, wipe any answers for questions now hidden
    // so stale data never gets submitted to the DB
    function clearNowHiddenAnswers() {
        allQuestions.forEach(q => {
            if (!shouldShow(q)) {
                delete answers[q.question_id];
            }
        });
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
        userId = new URLSearchParams(window.location.search).get('user');
        await loadSurvey();
    });

    async function loadSurvey() {
        try {
            const res = await fetch(`${API_BASE}/survey/${SURVEY_ID}/questions`);
            if (!res.ok) throw new Error('Failed to load survey');

            const data = await res.json();

            // Sort by position so questions appear in the right order
            allQuestions = data.questions.sort((a, b) => a.position - b.position);
            optionsMap   = data.options;

            renderQuestion(0);
        } catch (err) {
            renderError(err.message);
        }
    }

    // ─── RENDER QUESTION ──────────────────────────────────────────────────────
    function renderQuestion(index, direction = 'forward') {
        currentIndex = index;

        const activeQuestions = getActiveQuestions();
        const question        = activeQuestions[index];
        if (!question) return;

        const total        = activeQuestions.length;
        const progressPct  = Math.round((index / total) * 100);
        const isMulti      = isMultipleChoice(question.question_type);
        const opts         = optionsMap[question.question_id] || [];
        const currentAnswer = answers[question.question_id];

        // Salary question (position 34) is skippable
        const isSkippable = question.question_type === 'numeric' && question.position === 34;

        const isLastQuestion = index === total - 1;

        document.getElementById('app').innerHTML = `
            <div class="progress-wrap">
                <div class="progress-meta">
                    <span class="progress-label">Survey</span>
                    <span class="progress-count">${index + 1} / ${total}</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: ${progressPct}%"></div>
                </div>
            </div>

            <div class="question-wrap ${direction === 'forward' ? 'slide-enter' : 'slide-back-enter'}">
                <span class="q-type-badge">${getTypeLabel(question.question_type)}</span>
                <p class="q-text">${question.question_text}</p>
                ${buildInputHTML(question, opts, currentAnswer, isMulti)}
            </div>

            <div class="nav">
                <button class="btn btn-back" onclick="goBack()" ${index === 0 ? 'disabled' : ''}>
                    ← Back
                </button>

                ${isSkippable ? `<button class="btn-skip" onclick="skipQuestion()">Skip</button>` : ''}

                <button class="btn btn-next" id="btn-next" onclick="goNext()" ${!hasAnswer(question) ? 'disabled' : ''}>
                    ${isLastQuestion ? 'Submit ✓' : 'Next →'}
                </button>
            </div>
        `;

        // Attach click listeners to option items
        document.querySelectorAll('.option-item').forEach(el => {
            el.addEventListener('click', () => onOptionClick(el, question, isMulti));
        });

        // Attach input listener for text/number fields
        const textInput = document.getElementById('text-answer');
        if (textInput) {
            textInput.addEventListener('input', () => {
                answers[question.question_id] = textInput.value;
                document.getElementById('btn-next').disabled = !textInput.value.trim();
            });
        }
    }

    // ─── BUILD INPUT HTML ─────────────────────────────────────────────────────
    function buildInputHTML(question, opts, currentAnswer, isMulti) {
        // Numeric input (age, salary, years of experience)
        if (question.question_type === 'numeric') {
            const placeholder = question.position === 5
                ? 'Enter your age'
                : 'Enter a number';
            return `
                <input
                    id="text-answer"
                    class="text-input"
                    type="number"
                    placeholder="${placeholder}"
                    value="${currentAnswer || ''}"
                />
            `;
        }

        // Choice options (single or multiple)
        return `
            <div class="options-list ${isMulti ? 'multi' : ''}">
                ${opts.map(opt => {
                    const isSelected = isMulti
                        ? (Array.isArray(currentAnswer) && currentAnswer.includes(opt.option_id))
                        : currentAnswer === opt.option_id;

                    return `
                        <div class="option-item ${isSelected ? 'selected' : ''}" data-id="${opt.option_id}">
                            <div class="option-indicator"></div>
                            <span class="option-text">${opt.option_text}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    function getTypeLabel(type) {
        const labels = {
            'single_choice'   : 'Single choice',
            'multiple_choice' : 'Multiple choice',
            'mutliple_choice' : 'Multiple choice',   // typo in DB
            'multi_choice'    : 'Multiple choice',
            'multiple choice' : 'Multiple choice',
            'numeric'         : 'Number',
            'range'           : 'Single choice',
        };
        return labels[type] || 'Question';
    }

    function isMultipleChoice(type) {
        return ['multiple_choice', 'mutliple_choice', 'multi_choice', 'multiple choice'].includes(type);
    }

    function hasAnswer(question) {
        const answer = answers[question.question_id];
        if (Array.isArray(answer))       return answer.length > 0;
        if (typeof answer === 'string')  return answer.trim().length > 0;
        return answer !== undefined && answer !== null && answer !== '';
    }

    // ─── INTERACTIONS ─────────────────────────────────────────────────────────
    function onOptionClick(el, question, isMulti) {
        const clickedId = parseInt(el.dataset.id);

        if (isMulti) {
            // Toggle the clicked option in/out of the array
            let current = Array.isArray(answers[question.question_id])
                ? [...answers[question.question_id]]
                : [];

            if (current.includes(clickedId)) {
                current = current.filter(id => id !== clickedId);
            } else {
                current.push(clickedId);
            }

            answers[question.question_id] = current;

            // Update visual state for all options
            document.querySelectorAll('.option-item').forEach(item => {
                item.classList.toggle('selected', current.includes(parseInt(item.dataset.id)));
            });

        } else {
            // Single choice — replace previous answer
            answers[question.question_id] = clickedId;

            document.querySelectorAll('.option-item').forEach(item => {
                item.classList.toggle('selected', parseInt(item.dataset.id) === clickedId);
            });
        }

        // After this answer, some questions may now be hidden — clear their stale answers
        clearNowHiddenAnswers();

        // Enable/disable Next button
        document.getElementById('btn-next').disabled = !hasAnswer(question);
    }

    function skipQuestion() {
        const activeQuestions = getActiveQuestions();
        delete answers[activeQuestions[currentIndex].question_id];
        goNext(true);
    }

    function goNext(skipped = false) {
        const activeQuestions = getActiveQuestions();
        if (currentIndex < activeQuestions.length - 1) {
            renderQuestion(currentIndex + 1, 'forward');
        } else {
            submitSurvey();
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            renderQuestion(currentIndex - 1, 'back');
        }
    }

    // ─── SUBMIT ───────────────────────────────────────────────────────────────
    async function submitSurvey() {
        document.getElementById('app').innerHTML = `
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p class="loading-text">Submitting your answers…</p>
            </div>
        `;

        // Only submit answers for currently visible/active questions
        // Hidden questions were already wiped from answers, but this is a safety net
        const activeIds = new Set(getActiveQuestions().map(q => q.question_id));
        const payload   = [];

        Object.entries(answers).forEach(([questionId, value]) => {
            const qId = parseInt(questionId);

            // Skip if this question ended up hidden
            if (!activeIds.has(qId)) return;

            const question  = allQuestions.find(q => q.question_id === qId);
            const isMulti   = isMultipleChoice(question?.question_type);
            const isNumeric = question?.question_type === 'numeric';

            if (isNumeric) {
                // One row with raw_numbers
                payload.push({
                    question_id : qId,
                    raw_numbers : parseInt(value),
                    user_id     : userId
                });

            } else if (isMulti && Array.isArray(value)) {
                // One row per selected option
                value.forEach(optionId => {
                    payload.push({
                        question_id : qId,
                        option_id   : optionId,
                        user_id     : userId
                    });
                });

            } else {
                // Single choice — one row
                payload.push({
                    question_id : qId,
                    option_id   : value,
                    user_id     : userId
                });
            }
        });

        try {
            const res = await fetch(`${API_BASE}/survey/${SURVEY_ID}/answers`, {
                method  : 'POST',
                headers : { 'Content-Type': 'application/json' },
                body    : JSON.stringify({ answers: payload, user_id: userId })
            });

            if (!res.ok) throw new Error('Submit failed');

            renderThankYou();

        } catch (err) {
            renderError('Failed to submit. Please try again.');
        }
    }

    // ─── SCREENS ──────────────────────────────────────────────────────────────
    function renderThankYou() {
        document.getElementById('app').innerHTML = `
            <div class="thankyou-wrap">
                <div class="thankyou-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <h2 class="thankyou-title">Thank you!</h2>
                <p class="thankyou-sub">Your responses have been recorded. We appreciate your time.</p>
            </div>
        `;
    }

    function renderError(msg) {
        document.getElementById('app').innerHTML = `
            <div class="error-wrap">
                <div class="error-icon">⚠️</div>
                <p class="error-text">${msg}</p>
                <button class="btn btn-next" onclick="loadSurvey()" style="margin-top: 8px">
                    Try again
                </button>
            </div>
        `;
    }

</script>
</body>
</html>
